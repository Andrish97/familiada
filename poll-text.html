<!DOCTYPE html>
<html lang="pl">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta name="app-version" content="v2026-05-03T19574"/>

  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title data-i18n="pollText.title">Familiada — ankieta</title>

  <link rel="icon" href="favicon.ico?v=v2026-05-03T19574"/>
  <link rel="stylesheet" href="css/base.css?v=v2026-05-03T19574"/>
  <link rel="stylesheet" href="css/poll.css?v=v2026-05-03T19574"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script type="module" src="js/pages/poll-text.js?v=v2026-05-03T19574" defer></script>
  <script src="js/core/security-warning.js?v=v2026-05-03T19574" defer></script>
</head>

<body class="pollpub-body is-text">
  <main class="wrap">
    <div class="card">
      <div class="brand">FAMILIADA</div>
      <div class="title" id="title" data-i18n="pollText.pollTitle">Ankieta</div>
      <div class="sub" id="sub" data-i18n="pollText.loading">Ładuję…</div>

      <div class="qbox" id="qbox" style="display:none;">
        <div class="qtext" id="qtext">—</div>

        <div class="trow">
          <input class="inp" id="answerInput"
             placeholder="Wpisz odpowiedź..."
             data-i18n-placeholder="pollText.placeholder"
             autocomplete="off"
             maxlength="17" />
          <button class="btn gold full" id="btnSend" type="button">
            <span class="only-desktop" data-i18n="pollText.send">Wyślij</span>
            <span class="only-mobile" data-i18n="pollText.sendMobile">OK</span>
          </button>
        </div>

        <div class="tinyHint" id="tinyHint" data-i18n="pollText.maxChars">
          Maksymalnie 17 znaków.
        </div>

        <div class="nav">
          <div class="small" id="prog">—</div>
          <div class="small" id="count">0/17</div>
        </div>
      </div>

      <div class="closed" id="closed" style="display:none;">-</div>
    </div>

    <div class="footer">
      <div data-i18n="common.footer.left">© 2026 Familiada — system do gry na żywo</div>
      <button class="btn-contact-footer" type="button" data-contact-modal data-i18n="common.contactBtn">Kontakt</button>
    </div>
  </main>
  <script type="module" src="js/core/contact-modal.js?v=v2026-05-03T19574"></script>
</body>
</html>
