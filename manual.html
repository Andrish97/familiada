<!-- manual -->
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta name="app-version" content="v2026-04-23T22332"/>

  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title data-i18n="manual.title">Familiada — wskazówki</title>

  <link rel="icon" href="favicon.ico?v=v2026-04-23T22332" />

  <!-- Hide topbar/footer in modal mode — MUST be before base.css -->
  <style id="modalHideStyle">
    /* Filled by script if modal mode */
  </style>
  <script>
    try {
      const modal = new URLSearchParams(location.search).get("modal");
      if (modal && modal !== "false") {
        document.getElementById("modalHideStyle").textContent = ".topbar,.footer{display:none!important;visibility:hidden!important}.wrap{padding-top:0!important}.simple-tabs,.modal-tabs{display:flex!important;flex-wrap:wrap!important}";
        document.documentElement.classList.add("modal-mode");
      }
    } catch(e){}
  </script>

  <link rel="stylesheet" href="css/base.css?v=v2026-04-23T22332" />
  <link rel="stylesheet" href="css/manual.css?v=v2026-04-23T22332" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script type="module" src="js/pages/manual.js?v=v2026-04-23T22332" defer></script>
  <script type="module" src="js/core/topbar-controller.js?v=v2026-04-23T22332" defer></script>
  <script src="js/core/security-warning.js?v=v2026-04-23T22332" defer></script>
</head>

<body class="manual-body">
  <header class="topbar topbar-layout-4" id="mainTopbar">
    <div class="topbar-section topbar-section-1">
      <div class="brand">FAMILIADA</div>
      <button class="btn" id="btnBack" type="button" data-i18n="manual.backToGames">← Moje gry</button>
    </div>
    <div class="topbar-section topbar-section-2">
      <button class="btn" id="btnLegal" type="button" data-i18n="manual.legal">Polityka prywatności 🔐</button>
    </div>
    <div class="topbar-section topbar-section-3">
      <div class="topbar-close-slot" aria-hidden="true"></div>
    </div>
    <div class="topbar-section topbar-section-4">
      <span class="who" id="who">—</span>
      <button class="btn" id="btnLogout" type="button" data-i18n="common.authEntry">Zaloguj / Załóż konto</button>
    </div>
  </header>

  <main class="wrap m-wrap">
    <h1 class="page-title" data-i18n="manual.pageTitle">Wskazówki dla użytkownika</h1>
    <div class="page-subtitle mobile-only-tab-subtitle" id="manualTabSubtitle" aria-live="polite"></div>

    <nav class="simple-tabs" aria-label="Zakładki">
      <button class="tab active" type="button" data-tab="general" data-i18n="manual.tabs.general">Ogólny opis</button>
      <button class="tab" type="button" data-tab="edit" data-i18n="manual.tabs.edit">Gry</button>
      <button class="tab" type="button" data-tab="community" data-i18n="manual.tabs.community">Gry Społeczności</button>
      <button class="tab" type="button" data-tab="bases" data-i18n="manual.tabs.bases">Bazy pytań</button>
      <button class="tab" type="button" data-tab="polls" data-i18n="manual.tabs.polls">Ankiety</button>
      <button class="tab" type="button" data-tab="subscriptions" data-i18n="manual.tabs.subscriptions">Subskrypcje</button>
      <button class="tab" type="button" data-tab="logo" data-i18n="manual.tabs.logo">Tworzenie logo</button>
      <button class="tab" type="button" data-tab="control" data-i18n="manual.tabs.control">Panel sterowania</button>
      <button class="tab" type="button" data-tab="connect" data-i18n="manual.tabs.connect">Podłącz urządzenie</button>
      <button class="tab" type="button" data-tab="demo" data-i18n="manual.tabs.demo">Materiały Demo</button>
    </nav>

    <section class="tab-page tab-panel active" id="tab-general" data-tab="general"><div class="m-doc" data-i18n-html="manual.content.general"></div></section>
    <section class="tab-page tab-panel" id="tab-edit" data-tab="edit"><div class="m-doc" data-i18n-html="manual.content.edit"></div></section>
    <section class="tab-page tab-panel" id="tab-community" data-tab="community"><div class="m-doc" data-i18n-html="manual.content.community"></div></section>
    <section class="tab-page tab-panel" id="tab-bases" data-tab="bases"><div class="m-doc" data-i18n-html="manual.content.bases"></div></section>
    <section class="tab-page tab-panel" id="tab-polls" data-tab="polls"><div class="m-doc" data-i18n-html="manual.content.polls"></div></section>
    <section class="tab-page tab-panel" id="tab-subscriptions" data-tab="subscriptions"><div class="m-doc" data-i18n-html="manual.content.subscriptions"></div></section>
    <section class="tab-page tab-panel" id="tab-logo" data-tab="logo"><div class="m-doc" data-i18n-html="manual.content.logo"></div></section>
    <section class="tab-page tab-panel" id="tab-control" data-tab="control"><div class="m-doc" data-i18n-html="manual.content.control"></div></section>
    <section class="tab-page tab-panel" id="tab-connect" data-tab="connect"><div class="m-doc" data-i18n-html="manual.content.connect"></div></section>
    <section class="tab-page tab-panel" id="tab-demo" data-tab="demo"><div class="m-doc" data-i18n-html="manual.content.demo"></div></section>

    <div class="footer">
      <div data-i18n="common.footer.left">© 2026 Familiada — system do gry na żywo</div>
      <button class="btn-contact-footer" type="button" data-contact-modal data-i18n="common.contactBtn">Kontakt</button>
    </div>
  </main>
</body>
</html>
