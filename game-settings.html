<!DOCTYPE html>
<html lang="pl">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta name="app-version" content="v2026-07-13T07204"/>
  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title data-i18n="gameSettings.title">Familiada — Ustawienia rozgrywki</title>

  <link rel="icon" href="favicon.ico?v=v2026-07-13T07204"/>
  <link rel="stylesheet" href="css/base.css?v=v2026-07-13T07204"/>
  <link rel="stylesheet" href="css/game-settings.css?v=v2026-07-13T07204"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/core/security-warning.js?v=v2026-07-13T07204" defer></script>
  <script type="module">
    import { initI18n } from "/translation/translation.js?v=v2026-07-13T07204";
    await initI18n({ withSwitcher: true });
    import("/js/pages/game-settings.js?v=v2026-07-13T07204");
  </script>
</head>
<body class="gs-body">
  <header class="topbar topbar-layout-4">
    <div class="topbar-section topbar-section-1">
      <div class="brand">FAMILIADA</div>
      <button class="btn" id="btnBack" type="button" data-i18n="gameSettings.back">← Moje gry</button>
    </div>
    <div class="topbar-section topbar-section-2">
      <span class="gs-game-title" id="gsTitle">—</span>
    </div>
    <div class="topbar-section topbar-section-3">
      <span class="badge bad gs-unsaved-badge hidden" id="gsUnsavedBadge" data-i18n="gameSettings.unsaved">Niezapisane</span>
      <button class="btn" id="btnManual" type="button">ℹ️</button>
    </div>
    <div class="topbar-section topbar-section-4">
      <span class="who" id="whoStatic">—</span>
      <button class="btn" id="btnLogout" type="button" data-i18n="common.authEntry">Zaloguj / Załóż konto</button>
    </div>
  </header>

  <div class="helpOverlay hidden" id="helpOverlay">
    <div class="helpModal" role="dialog" aria-modal="true">
      <div class="helpModalToolbar">
        <button class="btn btn-sm" id="btnLegal" type="button" data-i18n="manual.legal">🔐 Polityka prywatności</button>
        <button class="btn xs helpCloseBtn" id="btnHelpClose" type="button" onclick="document.getElementById('helpOverlay').classList.add('hidden')">✕</button>
      </div>
      <iframe id="helpFrame" class="helpFrame" src="" title="Wskazówki"></iframe>
    </div>
  </div>

  <div class="legalOverlay hidden" id="legalOverlay">
    <div class="legalModal" role="dialog" aria-modal="true">
      <div class="legalModalToolbar">
        <button class="btn btn-sm" id="btnBackToManual" type="button" data-i18n="privacy.backToManual">← Wskazówki</button>
        <button class="btn xs legalCloseBtn" id="btnLegalClose" type="button" onclick="document.getElementById('legalOverlay').classList.add('hidden')">✕</button>
      </div>
      <iframe id="legalFrame" class="legalFrame" src="" title="Polityka prywatności"></iframe>
    </div>
  </div>

  <div class="gs-layout">
    <div class="gs-actionbar" id="gsFooter">
      <span class="gs-actionbar-msg hidden" id="gsFooterMsg" data-i18n="gameSettings.unsaved">Niezapisane zmiany</span>
      <div style="flex:1"></div>
      <button class="btn" id="btnResetAll" type="button" data-i18n="gameSettings.resetAll">Przywróć domyślne</button>
      <button class="btn gold" id="btnSaveAll" type="button" data-i18n="gameSettings.saveAll">Zapisz wszystko</button>
    </div>

    <nav class="gs-sidebar" id="gsSidebar">
      <button class="gs-sidebar-item active" data-cat="teams"     type="button" data-i18n="gameSettings.categories.teams">Drużyny</button>
      <button class="gs-sidebar-item"        data-cat="display"   type="button" data-i18n="gameSettings.categories.display">Wygląd</button>
      <button class="gs-sidebar-item"        data-cat="sound"     type="button" data-i18n="gameSettings.categories.sound">Dźwięk</button>
      <button class="gs-sidebar-item"        data-cat="questions" type="button" data-i18n="gameSettings.categories.questions">Pytania — Ustawienia</button>
      <button class="gs-sidebar-item gs-sidebar-sub" id="sidebarFinale" data-cat="finale" type="button" data-i18n="gameSettings.categories.finale">Pytania — Finał</button>
      <button class="gs-sidebar-item gs-sidebar-sub" id="sidebarRounds" data-cat="rounds" type="button" data-i18n="gameSettings.categories.rounds">Pytania — Rundy</button>
      <button class="gs-sidebar-item"        data-cat="game"      type="button" data-i18n="gameSettings.categories.game">Ustawienia gry</button>
    </nav>

    <main class="gs-content" id="gsContent">
      <div id="gsContentInner"><!-- rendered by JS --></div>
      <div id="gsDisplayIframeHolder" class="display-preview" style="display:none"></div>
    </main>

    <div class="footer gs-page-footer">
      <div data-i18n="common.footer.left">© 2026 Familiada — system do gry na żywo</div>
      <button class="btn-contact-footer" type="button" data-contact-modal data-i18n="common.contactBtn">Kontakt</button>
    </div>
  </div>

<div class="colorModalOverlay hidden" id="gsColorModal">
  <div class="colorModalBox">
    <div class="colorModalHead">
      <div class="colorModalTitle" id="gsColorModalTitle">Kolor</div>
      <button class="btn xs" id="gsColorModalClose" type="button">✕</button>
    </div>
    <div class="colorModalBody">
      <div class="colorTopRow">
        <div class="colorPreview" id="gsColorPreview"></div>
        <div style="min-width:220px;flex:1;">
          <div class="lbl2">HEX</div>
          <input class="inp" id="gsColorHex" autocomplete="off" spellcheck="false" inputmode="text" placeholder="#RRGGBB"/>
        </div>
      </div>
      <div class="sliders">
        <div class="sliderRow">
          <div class="sLbl">R</div>
          <input class="rng" id="gsColorR" type="range" min="0" max="255" step="1"/>
          <div class="sVal" id="gsColorRVal">0</div>
        </div>
        <div class="sliderRow">
          <div class="sLbl">G</div>
          <input class="rng" id="gsColorG" type="range" min="0" max="255" step="1"/>
          <div class="sVal" id="gsColorGVal">0</div>
        </div>
        <div class="sliderRow">
          <div class="sLbl">B</div>
          <input class="rng" id="gsColorB" type="range" min="0" max="255" step="1"/>
          <div class="sVal" id="gsColorBVal">0</div>
        </div>
      </div>
      <div class="colorModalFoot">
        <div></div>
        <button class="btn gold" id="gsColorModalDone" type="button">Gotowe</button>
      </div>
    </div>
  </div>
</div>

  <script type="module" src="js/core/contact-modal.js?v=v2026-07-13T07204"></script>
</body>
</html>
