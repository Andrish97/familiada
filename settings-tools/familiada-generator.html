<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familiada Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;--accent:#e8c547;--accent2:#f07b3f;--text:#e8e8f0;--muted:#6b6b80;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px}
  .wrap{width:100%;max-width:820px}
  header{text-align:center;margin-bottom:36px}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(46px,9vw,78px);letter-spacing:4px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 26px;margin-bottom:16px}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--accent);margin-bottom:16px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{display:flex;flex-direction:column;gap:5px}
  label{font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted)}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;padding:8px 12px;width:100%;outline:none;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  select option{background:var(--surface2)}
  textarea{resize:vertical;min-height:52px}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#0d0d0f;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;padding:12px 24px;width:100%;transition:opacity .2s,transform .1s}
  .btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
  .btn-sm{font-size:12px;padding:5px 11px;border-radius:6px;width:auto;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0;gap:4px;border:none;cursor:pointer;display:inline-flex;align-items:center}
  .btn-sm:disabled{opacity:.35;cursor:not-allowed}
  .btn-secondary{background:var(--surface2);border:1px solid var(--border)!important;color:var(--text)}
  .btn-secondary:hover:not(:disabled){background:#252530;transform:none;opacity:1}
  .btn-danger{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25)!important;color:var(--red)}
  .btn-danger:hover:not(:disabled){background:rgba(248,113,113,.22);transform:none;opacity:1}
  .btn-green{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25)!important;color:var(--green)}
  .btn-blue{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25)!important;color:var(--blue)}
  .btn-yellow{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25)!important;color:var(--yellow)}
  .status-bar{font-size:12px;padding:7px 11px;border-radius:7px;margin-top:10px;display:none}
  .status-bar.visible{display:block}
  .status-bar.ok{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);color:var(--green)}
  .status-bar.err{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:var(--red)}
  .status-bar.info{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);color:var(--blue)}
  .tip{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;font-size:12px;color:var(--muted);padding:8px 12px;line-height:1.6}
  /* progress */
  .progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress-label{font-size:13px;font-weight:500;color:var(--muted)}
  .progress-counter{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)}
  .progress-bar-bg{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden;margin-bottom:14px}
  .progress-bar-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:99px;transition:width .4s ease;width:0%}
  /* game items (manage) */
  #game-list{display:flex;flex-direction:column;gap:4px;margin-top:12px;max-height:480px;overflow-y:auto}
  /* game items (generated) */
  #gen-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .game-item{border-radius:8px;background:var(--surface2);border:1px solid var(--border);overflow:hidden}
  .game-item.approved{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.03)}
  .game-item.rejected{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.03);opacity:.55}
  .game-item.issue-dup{border-color:rgba(251,191,36,.35)}
  .game-item.issue-weak{border-color:rgba(248,113,113,.3)}
  .game-item.generating{border-color:rgba(232,197,71,.3);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .game-row{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;user-select:none}
  .game-row:hover{background:rgba(255,255,255,.02)}
  .game-num{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);min-width:30px}
  .game-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
  .game-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;flex-shrink:0}
  .badge-dup{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
  .badge-weak{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
  .badge-ok{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
  .badge-rej{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
  .game-chevron{color:var(--muted);font-size:11px;flex-shrink:0;transition:transform .2s}
  .game-chevron.open{transform:rotate(90deg)}
  .game-preview{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
  .game-preview.open{display:block}
  .preview-desc{font-size:12px;color:var(--muted);margin:8px 0 10px;line-height:1.55;font-style:italic}
  .preview-issue{font-size:11.5px;padding:5px 9px;border-radius:6px;margin:6px 0}
  .preview-issue.dup{background:rgba(251,191,36,.1);color:var(--yellow)}
  .preview-issue.weak{background:rgba(248,113,113,.08);color:var(--red)}
  .q-block{margin-bottom:9px}
  .q-text{font-size:12.5px;font-weight:600;margin-bottom:5px}
  .answers-grid{display:flex;flex-wrap:wrap;gap:4px}
  .ans-chip{font-size:11px;padding:2px 9px;border-radius:99px;background:var(--surface);border:1px solid var(--border);color:var(--muted);display:flex;gap:5px}
  .ans-pts{color:var(--accent);font-weight:600}
  .gen-actions{display:flex;gap:6px;flex-shrink:0}
  @media(max-width:520px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">FAMILIADA</div>
    <div class="subtitle">Generator gier &nbsp;·&nbsp; Groq + GitHub</div>
  </header>

  <!-- Manage existing -->
  <div class="card">
    <div class="card-title">📋 Gry w marketplace</div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:4px">
      <div class="field" style="flex:1;min-width:120px">
        <label>Język</label>
        <select id="manage-lang" onchange="loadedGames=[];renderManageList();$('scan-btn').disabled=true;$('renumber-btn').disabled=true;hideStatus('manage-status')">
          <option value="pl">🇵🇱 Polski</option>
          <option value="uk">🇺🇦 Українська</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="loadGameList()">Wczytaj</button>
      <button class="btn btn-sm btn-blue" id="scan-btn" onclick="scanGames()" disabled>🔍 Skanuj</button>
      <button class="btn btn-sm btn-yellow" id="renumber-btn" onclick="renumberGames()" disabled>Renumeruj</button>
    </div>
    <div id="game-list"><div style="color:var(--muted);font-size:12px;padding:10px 0;text-align:center">Wczytaj listę aby zobaczyć gry</div></div>
    <div class="status-bar" id="manage-status"></div>
  </div>

  <!-- Generate -->
  <div class="card">
    <div class="card-title">⚙️ Generuj nowe gry</div>
    <div class="grid-2" style="margin-bottom:12px">
      <div class="field">
        <label>Język</label>
        <select id="lang">
          <option value="pl">🇵🇱 Polski</option>
          <option value="uk">🇺🇦 Українська</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <div class="field">
        <label>Liczba gier</label>
        <input type="number" id="count" value="5" min="1" max="100">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>Temat (opcjonalnie)</label>
      <textarea id="topic" placeholder="Zostaw puste = AI dobierze unikalne tematy…"></textarea>
    </div>
    <div class="tip">Tematy istniejących gier są automatycznie przekazywane do AI. Gry możesz przejrzeć przed zapisem na GitHub.</div>
  </div>

  <button class="btn" id="gen-btn" onclick="startGeneration()">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    Generuj z podglądem
  </button>

  <!-- Generated results -->
  <div class="card" id="gen-section" style="display:none;margin-top:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px">
      <div class="card-title" style="margin-bottom:0">📝 Wygenerowane gry</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="gen-counter" style="font-size:12px;color:var(--muted)"></span>
        <div class="progress-bar-bg" style="width:120px;margin:0"><div class="progress-bar-fill" id="gen-progress-fill"></div></div>
      </div>
    </div>
    <div id="gen-list"></div>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-green" id="push-btn" onclick="pushApproved()" style="flex:1;min-width:180px" disabled>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        Wypchnij zatwierdzone na GitHub
      </button>
      <button class="btn btn-secondary btn-sm" onclick="approveAll()" style="font-size:13px;padding:10px 16px">Zatwierdź wszystkie</button>
    </div>
    <div class="status-bar" id="push-status"></div>
  </div>
</div>

<script type="module">
import { sb } from '/../js/core/supabase.js';

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function isRateLimit(e){ const m=(e?.message||'').toLowerCase(); return m.includes('429')||m.includes('rate')||m.includes('limit')||m.includes('too many'); }
function showStatus(id,msg,type='info'){ const el=$(id); el.textContent=msg; el.className=`status-bar visible ${type}`; }
function hideStatus(id){ $(id).className='status-bar'; }

async function call(body) {
  const {data,error} = await sb().functions.invoke('generate-game', {body});
  if (error) throw new Error(error.message||JSON.stringify(error));
  if (data?.error) throw new Error(data.error);
  return data;
}

// ─── manage list ──────────────────────────────────────────────────────────────
let loadedGames = [];

window.loadGameList = async function(){
  const lang=$('manage-lang').value;
  showStatus('manage-status','Wczytuję…','info');
  $('game-list').innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px 0;text-align:center">Ładowanie…</div>';
  $('scan-btn').disabled=true; $('renumber-btn').disabled=true;
  try{
    const res=await call({action:'list-games',lang});
    loadedGames=res.games||[];
    renderManageList();
    const hasGaps=checkGaps();
    $('scan-btn').disabled=loadedGames.length===0;
    $('renumber-btn').disabled=!hasGaps;
    showStatus('manage-status',`${loadedGames.length} gier.${hasGaps?' Wykryto luki — kliknij Renumeruj.':''}`,'ok');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); $('game-list').innerHTML=''; }
};

function checkGaps(){ return loadedGames.some((g,i)=>g.num!==i+1); }

window.renderManageList = function(){
  const list=$('game-list'); list.innerHTML='';
  if(!loadedGames.length){ list.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px 0;text-align:center">Brak gier.</div>'; return; }
  loadedGames.forEach((g,idx)=>{
    const issueClass=g.issueType==='dup'?'issue-dup':g.issueType==='weak'?'issue-weak':'';
    const badge=g.issueType==='dup'?`<span class="game-badge badge-dup">duplikat</span>`:g.issueType==='weak'?`<span class="game-badge badge-weak">słaba</span>`:'';
    const el=document.createElement('div');
    el.className=`game-item ${issueClass}`;
    el.innerHTML=`
      <div class="game-row" onclick="toggleManagePreview(${idx},this)">
        <span class="game-num">${String(g.num).padStart(3,'0')}</span>
        <span class="game-title">${esc(g.title)}</span>${badge}
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteGame(${idx})" style="padding:3px 9px">✕</button>
        <span class="game-chevron">▶</span>
      </div>
      <div class="game-preview" id="mp-${idx}">
        ${g.issueReason?`<div class="preview-issue ${g.issueType}">${esc(g.issueReason)}</div>`:''}
        ${g.description?`<div class="preview-desc">${esc(g.description)}</div>`:''}
        ${g.data?.questions?renderQs(g.data.questions):''}
      </div>`;
    list.appendChild(el);
  });
};

window.toggleManagePreview = async function(idx,row){
  const p=document.getElementById(`mp-${idx}`);
  const isOpening=!p.classList.contains('open');
  p.classList.toggle('open');
  row.querySelector('.game-chevron').classList.toggle('open',p.classList.contains('open'));
  if(isOpening && !loadedGames[idx].data){
    p.innerHTML='<div style="color:var(--muted);font-size:12px;padding:8px 0">Ładowanie…</div>';
    try{
      const g=loadedGames[idx];
      const res=await call({action:'get-game',lang:g.lang,filename:g.filename});
      g.data=res.data;
      g.title=res.data?.meta?.title||res.data?.game?.name||g.title;
      g.description=res.data?.meta?.description||'';
      row.querySelector('.game-title').textContent=g.title;
    }catch(e){ p.innerHTML=`<div style="color:var(--red);font-size:12px;padding:8px 0">✗ ${e.message}</div>`; return; }
    p.innerHTML=`
      ${loadedGames[idx].description?`<div class="preview-desc">${esc(loadedGames[idx].description)}</div>`:''}
      ${loadedGames[idx].data?.questions?renderQs(loadedGames[idx].data.questions):''}`;
  }
};

window.scanGames = async function(){
  $('scan-btn').disabled=true;
  showStatus('manage-status','Analizuję przez AI…','info');
  try{
    const lang=$('manage-lang').value;
    const games=loadedGames.map(g=>({slug:g.slug,title:g.title,description:g.description||''}));
    const res=await call({action:'scan',lang,games});
    loadedGames.forEach(g=>{g.issueType=null;g.issueReason='';});
    for(const issue of (res.issues||[])){
      for(const slug of (issue.slugs||[])){
        const g=loadedGames.find(x=>x.slug===slug);
        if(g){g.issueType=issue.type;g.issueReason=issue.reason||'';}
      }
    }
    const dups=(res.issues||[]).filter(i=>i.type==='duplicate').length;
    const weaks=(res.issues||[]).filter(i=>i.type==='weak').length;
    renderManageList();
    showStatus('manage-status',(res.issues||[]).length===0?'✓ Brak problemów.':`${dups} grup duplikatów · ${weaks} słabych`,(res.issues||[]).length===0?'ok':'info');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); }
  finally{ $('scan-btn').disabled=false; }
};

window.deleteGame = async function(idx){
  const g=loadedGames[idx];
  if(!confirm(`Usunąć ${String(g.num).padStart(3,'0')} – ${g.title}?`))return;
  showStatus('manage-status','Usuwam…','info');
  try{
    await call({action:'delete-game',lang:g.lang,filename:g.filename,sha:g.sha,indexKey:g.indexKey});
    loadedGames.splice(idx,1);
    renderManageList();
    $('renumber-btn').disabled=!checkGaps();
    showStatus('manage-status','Usunięto.','ok');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); }
};

window.renumberGames = async function(){
  if(!confirm('Renumerowanie zmieni nazwy plików na GitHubie. Kontynuować?'))return;
  $('renumber-btn').disabled=true;
  showStatus('manage-status','Renumeruję…','info');
  try{
    const lang=$('manage-lang').value;
    const res=await call({action:'renumber',lang,games:loadedGames.map(g=>({num:g.num,filename:g.filename,sha:g.sha,slug:g.slug,indexKey:g.indexKey}))});
    showStatus('manage-status',`Renumerowano ${res.renamed} gier.`,'ok');
    await loadGameList();
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); $('renumber-btn').disabled=false; }
};

// ─── generate ─────────────────────────────────────────────────────────────────
let genGames = [];   // { game, status: 'pending'|'approved'|'rejected', idx }
let generating = false;

function renderQs(qs){ return qs.map((q,i)=>`<div class="q-block"><div class="q-text">${i+1}. ${esc(q.text)}</div><div class="answers-grid">${(q.answers||[]).map(a=>`<span class="ans-chip">${esc(a.text)}<span class="ans-pts">${a.fixed_points}</span></span>`).join('')}</div></div>`).join(''); }

function renderGenList(){
  const list=$('gen-list'); list.innerHTML='';
  const approved=genGames.filter(g=>g.status==='approved').length;
  $('gen-counter').textContent=`${approved} / ${genGames.length} zatwierdzonych`;
  $('gen-progress-fill').style.width=genGames.length?`${(genGames.filter(g=>g.status!=='pending'&&g.game).length/genGames.length)*100}%`:'0%';
  $('push-btn').disabled=approved===0;

  genGames.forEach((item,idx)=>{
    const el=document.createElement('div');
    const statusClass=item.status==='approved'?'approved':item.status==='rejected'?'rejected':item.generating?'generating':'';
    const badgeHtml=item.status==='approved'?`<span class="game-badge badge-ok">✓ zatwierdzona</span>`:item.status==='rejected'?`<span class="game-badge badge-rej">✗ odrzucona</span>`:'';
    const title=item.game?.meta?.title||(item.generating?'Generuję…':'—');
    const qCount=item.game?.questions?.length??'';
    el.className=`game-item ${statusClass}`;
    el.innerHTML=`
      <div class="game-row" onclick="toggleGenPreview(${idx},this)">
        <span class="game-num" style="color:var(--muted)">${String(idx+1).padStart(2,'0')}</span>
        <span class="game-title">${esc(title)}</span>
        ${badgeHtml}
        ${qCount?`<span style="font-size:11px;color:var(--muted);flex-shrink:0">${qCount}p</span>`:''}
        <div class="gen-actions" onclick="event.stopPropagation()">
          <button class="btn-sm btn-green" onclick="setStatus(${idx},'approved')" ${!item.game?'disabled':''} title="Zatwierdź">✓ Zatwierdź</button>
          <button class="btn-sm btn-danger" onclick="setStatus(${idx},'rejected')" ${!item.game||item.generating?'disabled':''} title="Odrzuć i generuj nową">✗ Odrzuć</button>
        </div>
        <span class="game-chevron">▶</span>
      </div>
      <div class="game-preview" id="gp-${idx}">
        ${item.game?.meta?.description?`<div class="preview-desc">${esc(item.game.meta.description)}</div>`:''}
        ${item.game?.questions?renderQs(item.game.questions):'<span style="color:var(--muted);font-size:12px">Generowanie…</span>'}
      </div>`;
    list.appendChild(el);
  });
}

window.toggleGenPreview = function(idx,row){
  const p=document.getElementById(`gp-${idx}`);
  if(p) row.querySelector('.game-chevron').classList.toggle('open',p.classList.toggle('open'));
};

window.setStatus = function(idx,status){
  if(!genGames[idx]?.game)return;
  genGames[idx].status=status;
  renderGenList();
  if(status==='rejected') regenerate(idx);
};

window.approveAll = function(){
  genGames.forEach(g=>{ if(g.game) g.status='approved'; });
  renderGenList();
};

window.regenerate = async function(idx){
  const item=genGames[idx];
  if(item.generating)return;
  item.game=null; item.status='pending'; item.generating=true;
  renderGenList();
  try{
    const lang=$('lang').value;
    const existingTitles=genGames.filter((_,i)=>i!==idx&&_.game).map(g=>g.game.meta?.title).filter(Boolean);
    // also get marketplace titles
    try{ const r=await call({action:'list-games',lang}); (r.games||[]).forEach(g=>existingTitles.push(g.title)); }catch{}
    const res=await callWithRetry({action:'generate',lang,index:idx+1,total:genGames.length,topic:$('topic').value.trim(),alreadyUsed:existingTitles},idx+1);
    item.game=res.game;
    item.status='pending';
  }catch(e){ item.status='rejected'; item.game=null; }
  item.generating=false;
  renderGenList();
  // auto-open preview
  setTimeout(()=>{ const row=document.querySelector(`#gen-list .game-item:nth-child(${idx+1}) .game-row`); if(row){ const p=document.getElementById(`gp-${idx}`); if(p&&!p.classList.contains('open')){ p.classList.add('open'); row.querySelector('.game-chevron')?.classList.add('open'); } } },50);
};

async function callWithRetry(payload,num,maxRetries=4){
  let lastErr;
  for(let attempt=1;attempt<=maxRetries;attempt++){
    try{ return await call(payload); }
    catch(e){
      lastErr=e; if(attempt>=maxRetries)break;
      const cd=isRateLimit(e)?(attempt===1?15000:30000):(attempt===1?3000:8000);
      await sleep(cd);
    }
  }
  throw lastErr;
}

window.startGeneration = async function(){
  if(generating)return;
  const lang=$('lang').value;
  const count=Math.max(1,parseInt($('count').value)||5);
  const topic=$('topic').value.trim();
  generating=true;
  $('gen-btn').disabled=true;
  $('gen-section').style.display='block';
  hideStatus('push-status');

  // init slots
  genGames=Array.from({length:count},(_,i)=>({game:null,status:'pending',generating:true,idx:i}));
  renderGenList();

  // get existing titles
  const existingTitles=[];
  try{ const r=await call({action:'list-games',lang}); (r.games||[]).forEach(g=>{ if(g.title)existingTitles.push(g.title); }); }catch{}

  // generate one by one
  for(let i=0;i<count;i++){
    const allUsed=[...existingTitles,...genGames.slice(0,i).filter(g=>g.game).map(g=>g.game.meta?.title).filter(Boolean)];
    try{
      const res=await callWithRetry({action:'generate',lang,index:i+1,total:count,topic,alreadyUsed:allUsed},i+1);
      genGames[i].game=res.game; genGames[i].status='pending';
    }catch(e){
      genGames[i].game=null; genGames[i].status='rejected';
    }
    genGames[i].generating=false;
    renderGenList();
    // auto-open first generated
    if(i===0) setTimeout(()=>{ const row=document.querySelector('#gen-list .game-row'); if(row){ const p=document.getElementById('gp-0'); if(p){ p.classList.add('open'); row.querySelector('.game-chevron')?.classList.add('open'); } } },50);
    if(i<count-1) await sleep(300);
  }
  generating=false;
  $('gen-btn').disabled=false;
};

window.pushApproved = async function(){
  const lang=$('lang').value;
  const approved=genGames.filter(g=>g.status==='approved'&&g.game);
  if(!approved.length){ showStatus('push-status','Brak zatwierdzonych gier.','info'); return; }
  $('push-btn').disabled=true;
  showStatus('push-status',`Zapisuję ${approved.length} gier na GitHub…`,'info');
  try{
    const games=approved.map(g=>g.game);
    const res=await call({action:'save-games',lang,games});
    showStatus('push-status',`✓ Zapisano ${res.saved?.length||approved.length} gier. index.json zaktualizowany.`,'ok');
    // mark as saved
    approved.forEach(g=>{ g.status='rejected'; }); // dim them
    renderGenList();
  }catch(e){ showStatus('push-status','✗ '+e.message,'err'); $('push-btn').disabled=false; }
};
</script>
