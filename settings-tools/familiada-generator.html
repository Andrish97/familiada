<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familiada Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
  :root{--bg:#050914;--card:rgba(255,255,255,.06);--card2:rgba(255,255,255,.03);--border:rgba(255,255,255,.14);--border2:rgba(255,255,255,.08);--gold:#ffeaa6;--muted:rgba(255,255,255,.5);--green:#4ade80;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 60px}
  .wrap{width:100%;max-width:820px}
  header{text-align:center;margin-bottom:28px}
  .logo{font-size:clamp(28px,6vw,42px);font-weight:1000;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);line-height:1}
  .subtitle{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:14px}
  .card-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;opacity:.9}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{display:flex;flex-direction:column;gap:5px}
  label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  input,select,textarea{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:inherit;font-size:13.5px;padding:8px 12px;width:100%;outline:none;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{border-color:rgba(255,255,255,.4)}
  select option{background:#0d1426}
  textarea{resize:vertical;min-height:52px}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:14px;color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;padding:11px 22px;width:100%;transition:filter .15s,transform .1s;text-decoration:none;user-select:none}
  .btn:hover:not(:disabled){filter:brightness(1.12)}
  .btn:active:not(:disabled){transform:translateY(1px)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn-sm{font-size:12px;padding:6px 12px;border-radius:10px;width:auto;font-weight:700;gap:4px;cursor:pointer;display:inline-flex;align-items:center}
  .btn-sm:disabled{opacity:.35;cursor:not-allowed}
  .btn-primary{background:rgba(255,234,166,.15);border-color:rgba(255,234,166,.35)!important;color:var(--gold)}
  .btn-secondary{background:rgba(255,255,255,.05);border:1px solid var(--border2)!important;color:rgba(255,255,255,.8)}
  .btn-danger{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25)!important;color:var(--red)}
  .btn-green{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25)!important;color:var(--green)}
  .btn-blue{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25)!important;color:var(--blue)}
  .btn-yellow{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25)!important;color:var(--yellow)}
  .status-bar{font-size:12px;padding:7px 12px;border-radius:10px;margin-top:10px;display:none}
  .status-bar.visible{display:block}
  .status-bar.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green)}
  .status-bar.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red)}
  .status-bar.info{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--blue)}
  .tip{background:rgba(255,234,166,.05);border-left:2px solid rgba(255,234,166,.4);border-radius:0 10px 10px 0;font-size:12px;color:var(--muted);padding:8px 12px;line-height:1.6}
  .progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress-label{font-size:13px;font-weight:500;color:var(--muted)}
  .progress-counter{font-size:18px;font-weight:800;color:var(--gold)}
  .progress-bar-bg{background:rgba(255,255,255,.08);border-radius:99px;height:4px;overflow:hidden;margin-bottom:14px}
  .progress-bar-fill{background:linear-gradient(90deg,rgba(255,234,166,.8),rgba(255,234,166,.4));height:100%;border-radius:99px;transition:width .4s ease;width:0%}
  #game-list{display:flex;flex-direction:column;gap:3px;margin-top:12px;max-height:480px;overflow-y:auto}
  #gen-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .game-item{border-radius:10px;background:var(--card2);border:1px solid var(--border2);overflow:hidden;flex-shrink:0}
  .game-item.approved{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
  .game-item.rejected{border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.03);opacity:.5}
  .game-item.issue-dup{border-color:rgba(251,191,36,.3)}
  .game-item.issue-weak{border-color:rgba(248,113,113,.25)}
  .game-item.generating{border-color:rgba(255,234,166,.25);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .game-row{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none}
  .game-row:hover{background:rgba(255,255,255,.03)}
  .game-num{font-size:12px;font-weight:800;color:var(--gold);opacity:.7;min-width:32px}
  .game-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:500}
  .game-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;flex-shrink:0;white-space:nowrap}
  .badge-dup{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
  .badge-weak{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
  .badge-ok{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.2)}
  .badge-new{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.25)}
  .badge-rej{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
  .game-chevron{color:var(--muted);font-size:10px;flex-shrink:0;transition:transform .2s;opacity:.6}
  .game-chevron.open{transform:rotate(90deg)}
  .game-preview{display:none;padding:0 12px 12px;border-top:1px solid var(--border2)}
  .game-preview.open{display:block}
  .preview-desc{font-size:12px;color:var(--muted);margin:8px 0 10px;line-height:1.55;font-style:italic}
  .preview-issue{font-size:11.5px;padding:5px 9px;border-radius:8px;margin:6px 0}
  .preview-issue.dup{background:rgba(251,191,36,.08);color:var(--yellow)}
  .preview-issue.weak{background:rgba(248,113,113,.07);color:var(--red)}
  .q-block{margin-bottom:9px}
  .q-text{font-size:12.5px;font-weight:600;margin-bottom:5px}
  .answers-grid{display:flex;flex-wrap:wrap;gap:4px}
  .ans-chip{font-size:11px;padding:2px 9px;border-radius:99px;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:rgba(255,255,255,.6);display:flex;gap:5px}
  .ans-pts{color:var(--gold);font-weight:600;opacity:.8}
  .gen-actions{display:flex;gap:6px;flex-shrink:0}
  .game-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);background:rgba(255,255,255,.06);cursor:pointer;flex-shrink:0;appearance:none;-webkit-appearance:none;position:relative;transition:border-color .15s,background .15s}
  .game-cb:checked{background:rgba(255,234,166,.25);border-color:rgba(255,234,166,.6)}
  .game-cb:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold);font-weight:800}
  .bulk-bar{display:none;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,234,166,.06);border:1px solid rgba(255,234,166,.2);border-radius:10px;margin-top:8px;flex-wrap:wrap}
  .bulk-bar.visible{display:flex}
  .bulk-count{font-size:12px;font-weight:700;color:var(--gold);flex:1}
  .pending-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.25);border-radius:10px;margin-top:8px;flex-wrap:wrap}
  .pending-bar.visible{display:flex}
  .game-item.pending-delete{opacity:.4;text-decoration:line-through}
  .game-item.pending-delete .game-row{pointer-events:none}
  #manage-card.busy{pointer-events:none;opacity:.55}
  #manage-card.busy #game-list::after{content:'';position:absolute;inset:0;background:rgba(5,9,20,.4);border-radius:10px;z-index:10}
  #game-list{position:relative}
  @media(max-width:520px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">


  <!-- Session -->
  <div class="card" id="session-card">
    <div class="card-title">🌐 Sesja</div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
      <div class="field" style="flex:1;min-width:120px">
        <label>Język</label>
        <select id="manage-lang" onchange="resetManage()">
          <option value="pl">🇵🇱 Polski</option>
          <option value="uk">🇺🇦 Українська</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <button class="btn btn-sm btn-secondary" id="load-btn" onclick="loadGameList()">Wczytaj</button>
      <button class="btn btn-sm btn-danger" id="reset-btn" onclick="resetSession()" style="display:none">↺ Zrezygnuj</button>
      <span id="groq-counter" style="display:none;font-size:11px;color:var(--muted);margin-left:4px"></span>
    </div>
    <div class="pending-bar" id="pending-bar">
      <span style="font-size:12px;font-weight:700;color:var(--red);flex:1" id="pending-count"></span>
      <button class="btn btn-sm btn-secondary" onclick="clearPending()">Cofnij</button>
      <button class="btn btn-sm btn-danger" id="save-btn" onclick="saveChanges()">💾 Zapisz zmiany</button>
    </div>
    <div class="status-bar" id="session-status"></div>
  </div>

  <!-- Manage existing -->
  <div class="card" id="manage-card" style="display:none">
    <div class="card-title">📋 Gry w marketplace</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
      <button class="btn btn-sm btn-blue" id="scan-btn" onclick="scanGames()" disabled>🔍 Skanuj</button>
    </div>
    <div class="bulk-bar" id="bulk-bar">
      <span class="bulk-count" id="bulk-count">0 zaznaczonych</span>
      <button class="btn btn-sm btn-secondary" onclick="selectIssues()">Zaznacz problemy</button>
      <button class="btn btn-sm btn-secondary" id="sel-all-btn" onclick="toggleSelectAll()">Zaznacz wszystkie</button>
      <button class="btn btn-sm btn-secondary" onclick="clearSelection()">Odznacz</button>
      <button class="btn btn-sm btn-danger" onclick="deleteSelected()">✕ Usuń zaznaczone</button>
    </div>
    <div id="game-list"><div style="color:var(--muted);font-size:12px;padding:10px 0;text-align:center">Wczytaj listę aby zobaczyć gry</div></div>
    <div class="status-bar" id="manage-status"></div>
  </div>

  <!-- Generate -->
  <div class="card" id="gen-card" style="display:none">
    <div class="card-title">⚙️ Kolejka generowania gier</div>
    <div style="margin-bottom:12px">
      <div class="field">
        <label>Liczba gier</label>
        <input type="number" id="count" value="5" min="1" max="100">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>Temat (opcjonalnie)</label>
      <textarea id="topic" placeholder="Zostaw puste = AI dobierze unikalne tematy…"></textarea>
    </div>
    <div class="tip">Nowe gry zostaną dodane do kolejki i wygenerowane w tle. Po zakończeniu pojawią się w marketplace.</div>
    <div id="queue-status" style="margin-top:10px"></div>
  </div>

  <button class="btn" id="gen-btn" onclick="enqueueGeneration()" style="display:none">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    Dodaj do kolejki generowania
  </button>

  <!-- Generated results -->
  <div class="card" id="gen-section" style="display:none;margin-top:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:4px">
      <div class="card-title" style="margin-bottom:0">📝 Wygenerowane gry</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="gen-counter" style="font-size:12px;color:var(--muted)"></span>
        <div class="progress-bar-bg" style="width:120px;margin:0"><div class="progress-bar-fill" id="gen-progress-fill"></div></div>
      </div>
    </div>
    <div id="gen-list"></div>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-green" id="push-btn" onclick="pushApproved()" style="flex:1;min-width:180px" disabled>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        Dodaj zatwierdzone do listy
      </button>
      <button class="btn btn-secondary btn-sm" onclick="approveAll()" style="font-size:13px;padding:10px 16px">Zatwierdź wszystkie</button>
    </div>
    <div class="status-bar" id="push-status"></div>
  </div>
</div>

<script type="module">
import { sb } from '/../js/core/supabase.js';

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function isRateLimit(e){ const m=(e?.message||'').toLowerCase(); return m.includes('429')||m.includes('rate')||m.includes('limit')||m.includes('too many'); }
function showStatus(id,msg,type='info'){ const el=$(id); el.textContent=msg; el.className=`status-bar visible ${type}`; }
function hideStatus(id){ $(id).className='status-bar'; }

// ─── QuestionIndex ─────────────────────────────────────────────────────────────
const Q_STOPWORDS=new Set(['co','ile','jak','czy','jakie','jaki','jaka','które','który','która','w','na','do','z','i','a','o','po','ze','się','nie','to','jest','są','was','by','też','już','że','przy','nad','pod','za','przed','przez','dla','oraz','wymien','wymiencie','podaj','podajcie','wskaż','wskazcie','powiedz','powiedzcie','napisz','napiszcie','nazwij','nazwijcie','zgadnij','zgadnijcie','wskaz']);
const Q_SIM=0.50;   // Jaccard tokenów → pytania "podobne"
const Q_DUP=0.30;   // % podobnych pytań między grami → duplikat

function qNormWord(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l')
    .replace(/ń/g,'n').replace(/ó/g,'o').replace(/ś/g,'s').replace(/ź/g,'z').replace(/ż/g,'z')
    .replace(/і/g,'i').replace(/є/g,'e').replace(/ї/g,'i');
}
function qTokenize(text){
  return qNormWord(text).split(/\W+/).filter(w=>w.length>=3&&!Q_STOPWORDS.has(w));
}
function qJaccard(a,b){
  const sa=new Set(a),sb=new Set(b);
  const inter=[...sa].filter(x=>sb.has(x)).length;
  return inter/(sa.size+sb.size-inter)||0;
}

class QuestionIndex {
  constructor(){ this.entries=[]; this.tokIdx=new Map(); } // entries: {slug,title,qtoks}

  add(slug, title, questions){
    const idx=this.entries.length;
    const qtoks=questions.map(q=>qTokenize(q.text||q)).filter(t=>t.length>=2);
    this.entries.push({slug,title,qtoks});
    for(const toks of qtoks) for(const tok of toks){
      if(!this.tokIdx.has(tok)) this.tokIdx.set(tok,new Set());
      this.tokIdx.get(tok).add(idx);
    }
  }

  // zwraca [{slug,title}] — gry które mają pytanie podobne do podanego (single question)
  findSimilarGames(question){
    const tokens=qTokenize(question.text||question);
    if(tokens.length<2) return [];
    const candidates=new Set();
    for(const tok of tokens){const idxs=this.tokIdx.get(tok);if(idxs)for(const i of idxs)candidates.add(i);}
    const results=[];
    for(const i of candidates){
      const {slug,title,qtoks}=this.entries[i];
      for(const bt of qtoks){if(qJaccard(tokens,bt)>=Q_SIM){results.push({slug,title});break;}}
    }
    return results;
  }

  // zwraca [{slug,title,pct}] — gry z >Q_DUP pokryciem podobnych pytań
  findSimilar(questions){
    const qtoks=questions.map(q=>qTokenize(q.text||q)).filter(t=>t.length>=2);
    if(!qtoks.length) return [];
    const candidates=new Set();
    for(const toks of qtoks) for(const tok of toks){
      const idxs=this.tokIdx.get(tok);
      if(idxs) for(const i of idxs) candidates.add(i);
    }
    const results=[];
    for(const i of candidates){
      const {slug,title,qtoks:bqt}=this.entries[i];
      let sim=0; const used=new Set();
      for(const at of qtoks){
        let best=0,bestB=-1;
        for(let b=0;b<bqt.length;b++){if(used.has(b))continue;const s=qJaccard(at,bqt[b]);if(s>best){best=s;bestB=b;}}
        if(best>=Q_SIM){sim++;used.add(bestB);}
      }
      const pct=sim/Math.min(qtoks.length,bqt.length);
      if(pct>=Q_DUP) results.push({slug,title,pct});
    }
    return results.sort((a,b)=>b.pct-a.pct);
  }
}

let marketplaceQIndex = null;
let sessionActive = false;
let groqCalls = 0;

function incGroq(n=1){
  groqCalls+=n;
  const el=$('groq-counter');
  el.style.display='';
  el.textContent=`Groq: ${groqCalls} req`;
}

function lockSession(){
  sessionActive=true;
  $('manage-lang').disabled=true;
  $('load-btn').disabled=true;
  $('reset-btn').style.display='';
  $('manage-card').style.display='';
  $('gen-card').style.display='';
  $('gen-btn').style.display='';
}

window.resetSession = function(){
  loadedGames=[]; pendingAdd=[];
  pendingDelete.clear(); updatePendingBar();
  selectedGames.clear(); updateBulkBar();
  sessionActive=false;
  $('manage-lang').disabled=false;
  $('load-btn').disabled=false;
  $('scan-btn').disabled=true;
  $('reset-btn').style.display='none';
  $('manage-card').style.display='none';
  hideStatus('manage-status');
  hideStatus('session-status');
  genGames=[]; generating=false;
  $('gen-card').style.display='none'; $('gen-btn').style.display='none'; $('gen-section').style.display='none';
  groqCalls=0; $('groq-counter').style.display='none';
};

async function call(body) {
  const {data,error} = await sb().functions.invoke('generate-game', {body});
  if (error) throw new Error(error.message||JSON.stringify(error));
  if (data?.error) throw new Error(data.error);
  return data;
}

// ─── slugify (client-side, matches server) ────────────────────────────────────
function slugify(text){
  return (text||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l')
    .replace(/ń/g,'n').replace(/ó/g,'o').replace(/ś/g,'s').replace(/ź/g,'z').replace(/ż/g,'z')
    .replace(/і/g,'i').replace(/є/g,'e').replace(/ї/g,'i')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

// ─── manage list ──────────────────────────────────────────────────────────────
let loadedGames = [];   // {num,filename,slug,sha,lang,indexKey,title,description,data,issueType,issueReason}
let pendingDelete = new Set(); // slugi gier z GitHub do usunięcia
let pendingAdd = [];    // [{slug, content}] — nowe gry do dodania (tylko lokalne)

function updatePendingBar(){
  const nd=pendingDelete.size, na=pendingAdd.length, total=nd+na;
  $('pending-bar').classList.toggle('visible',total>0);
  const parts=[];
  if(na) parts.push(`+${na} do dodania`);
  if(nd) parts.push(`−${nd} do usunięcia`);
  $('pending-count').textContent=parts.join(' · ');
}

window.clearPending = function(){
  // usuń pending-add z loadedGames
  loadedGames=loadedGames.filter(g=>!g.isPendingAdd);
  pendingAdd=[];
  pendingDelete.clear();
  updatePendingBar(); renderManageList();
};

window.saveChanges = async function(){
  if(!pendingDelete.size&&!pendingAdd.length) return;
  setListBusy(true);
  showStatus('manage-status','Zapisuję zmiany…','info');
  try{
    const lang=$('manage-lang').value;
    
    // Obsługa usuwania
    if (pendingDelete.size > 0) {
      const slugsToDelete = [...pendingDelete];
      // Pobieramy ID i storage_path gier do usunięcia
      const { data: toDelete } = await sb()
        .from('market_games')
        .select('id, storage_path')
        .in('storage_path', loadedGames.filter(g => pendingDelete.has(g.slug)).map(g => g.indexKey));
      
      if (toDelete) {
        for (const g of toDelete) {
          // Usuwamy z bazy (RPC z p_force=true dla admina jeśli trzeba, ale tutaj upraszczamy)
          await sb().from('market_games').delete().eq('id', g.id);
          // Usuwamy ze storage
          if (g.storage_path) {
            await sb().storage.from('community-games').remove([g.storage_path]);
          }
        }
      }
    }

    // Obsługa dodawania (pętla po pendingAdd)
    if (pendingAdd.length > 0) {
      const { data: files } = await sb().storage.from('community-games').list(`marketplace/${lang}`);
      let nextNum = 1;
      if (files) {
        const nums = files.map(f => parseInt(f.name)).filter(n => !isNaN(n));
        if (nums.length) nextNum = Math.max(...nums) + 1;
      }

      for (let i = 0; i < pendingAdd.length; i++) {
        const item = pendingAdd[i];
        const numStr = String(nextNum + i).padStart(3, "0");
        const filename = `${numStr}-${item.slug}.json`;
        const storagePath = `marketplace/${lang}/${filename}`;
        const gameData = JSON.parse(item.content);

        await sb().storage.from('community-games').upload(storagePath, item.content, { upsert: true });
        
        await sb().rpc('market_admin_upsert', {
          p_storage_path: storagePath,
          p_title: gameData.meta?.title || item.slug,
          p_description: gameData.meta?.description || "",
          p_lang: lang,
          p_payload: gameData
        });
      }
    }

    resetSession();
    showStatus('session-status', '✓ Zmiany zapisane.', 'ok');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); }
  finally{ setListBusy(false); }
};

function applyIssues(issues){
  for(const issue of (issues||[])){
    const itype=issue.type==='duplicate'?'dup':issue.type;
    for(const slug of (issue.slugs||[])){
      const slugified=slug.toLowerCase().replace(/\s+/g,'-');
      const g=loadedGames.find(x=>x.slug===slug||x.slug===slugified||x.title.toLowerCase().replace(/\s+/g,'-')===slug.toLowerCase());
      if(g){g.issueType=itype;g.issueReason=issue.reason||'';}
    }
  }
}

window.scanGames = async function(){
  $('scan-btn').disabled=true;
  setListBusy(true);
  const LOAD_BATCH=8;
  try{
    const lang=$('manage-lang').value;

    // 1. pre-load all game data
    const missing=loadedGames.filter(g=>!g.data);
    if(missing.length){
      for(let i=0;i<missing.length;i+=LOAD_BATCH){
        showStatus('manage-status',`Ładuję dane ${i}/${missing.length}…`,'info');
        await Promise.all(missing.slice(i,i+LOAD_BATCH).map(async g=>{
          try{
            const res=await call({action:'get-game',lang:g.lang,filename:g.filename});
            g.data=res.data; g.title=res.data?.meta?.title||res.data?.game?.name||g.title; g.description=res.data?.meta?.description||'';
          }catch{}
        }));
      }
    }

    // 2. reset + lokalne sprawdzenia
    loadedGames.forEach(g=>{g.issueType=null;g.issueReason='';});

    // reguły jakości
    for(const g of loadedGames){
      const qs=g.data?.questions||[];
      const reasons=[];
      if(!g.description||g.description.trim().length<30) reasons.push('zbyt krótki opis');
      if(qs.length>0&&qs.length<10) reasons.push(`za mało pytań (${qs.length}/10)`);
      if(qs.length>0){const thin=qs.filter(q=>(q.answers||[]).length<=3).length;const pct=Math.round(thin/qs.length*100);if(pct>30)reasons.push(`${pct}% pytań ma ≤3 odpowiedzi`);}
      if(reasons.length){g.issueType='weak';g.issueReason=reasons.join(', ')+'.';}
    }

    // buduj globalną pulę pytań
    marketplaceQIndex=new QuestionIndex();
    for(const g of loadedGames) if(g.data?.questions) marketplaceQIndex.add(g.slug,g.title,g.data.questions);

    // parametry
    const total=loadedGames.length;
    const DUP_MIN_REPS=4;                    // ≥N powtórzonych pytań w puli → duplikat (check 1)
    const GENERIC_RATIO=0.08;                // pytanie w >8% gier = generyczne, pomijamy
    const PAIR_THRESHOLD=0.9*total/(total+350); // Michaelis-Menten: 100gr=20%, →90%
    const slugToIdx=new Map(loadedGames.map((g,i)=>[g.slug,i]));

    // check 1: per-gra — ile jej pytań istnieje w puli (spread > 0, nie generyczne)
    for(const g of loadedGames){
      if(g.issueType||!g.data?.questions?.length) continue;
      const spreads=[];
      for(const q of g.data.questions){
        const hits=marketplaceQIndex.findSimilarGames(q).filter(h=>h.slug!==g.slug);
        if(!hits.length) continue;
        if(hits.length/total>GENERIC_RATIO) continue;
        spreads.push(hits.length);
      }
      if(spreads.length<DUP_MIN_REPS) continue;
      const bySpread={};
      for(const s of spreads) bySpread[s]=(bySpread[s]||0)+1;
      const breakdown=Object.entries(bySpread).sort(([a],[b])=>+a-+b).map(([s,c])=>`${c}×w ${s} ${+s===1?'grze':'grach'}`).join(', ');
      g.issueType='dup';
      g.issueReason=`${spreads.length} powtórzonych pytań: ${breakdown}.`;
    }

    // check 2: pairwise — dwie gry nie mogą dzielić >total/5% pytań między sobą
    const pairShared=new Map(); // "i,j" → liczba podobnych pytań
    for(let i=0;i<loadedGames.length;i++){
      const g=loadedGames[i];
      if(!g.data?.questions) continue;
      for(const q of g.data.questions){
        for(const hit of marketplaceQIndex.findSimilarGames(q)){
          const j=slugToIdx.get(hit.slug);
          if(j===undefined||j<=i) continue;
          const key=`${i},${j}`;
          pairShared.set(key,(pairShared.get(key)||0)+1);
        }
      }
    }
    for(const [key,shared] of pairShared){
      const [i,j]=key.split(',').map(Number);
      const gi=loadedGames[i], gj=loadedGames[j];
      const minQ=Math.min(gi.data?.questions?.length||0,gj.data?.questions?.length||0);
      if(!minQ) continue;
      const pct=shared/minQ;
      if(pct<=PAIR_THRESHOLD) continue;
      const pctStr=Math.round(pct*100)+'%', maxStr=Math.round(PAIR_THRESHOLD*100)+'%';
      if(!gi.issueType){gi.issueType='dup';gi.issueReason=`${pctStr} pytań pokrywa się z "${gj.title}" (max ${maxStr}).`;}
      if(!gj.issueType){gj.issueType='dup';gj.issueReason=`${pctStr} pytań pokrywa się z "${gi.title}" (max ${maxStr}).`;}
    }

    // 3. AI — tylko duplikaty tematyczne (tytuły, 1 call, nie słabe)
    showStatus('manage-status',`AI: duplikaty (${total} gier)…`,'info');
    const dupRes=await call({action:'scan',lang,mode:'duplicates',games:loadedGames.map(g=>({slug:g.slug,title:g.title,description:''}))});
    incGroq();
    applyIssues(dupRes.issues.filter(i=>i.type==='duplicate'));

    selectedGames.clear(); updateBulkBar();
    const dups=loadedGames.filter(g=>g.issueType==='dup').length;
    const weaks=loadedGames.filter(g=>g.issueType==='weak').length;
    renderManageList();
    showStatus('manage-status',(!dups&&!weaks)?'✓ Brak problemów.':`${dups} duplikatów · ${weaks} słabych`,(!dups&&!weaks)?'ok':'info');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); }
  finally{ $('scan-btn').disabled=false; setListBusy(false); }
};

    selectedGames.clear(); updateBulkBar();
  } else {
    if(pendingDelete.has(g.slug)) pendingDelete.delete(g.slug);
    else pendingDelete.add(g.slug);
  }
  updatePendingBar(); renderManageList();
};

  }
  selectedGames.clear(); updateBulkBar(); updatePendingBar(); renderManageList();
};

window.regenerate = async function(idx){
  const item=genGames[idx];
  if(item.generating)return;
  item.game=null; item.status='pending'; item.generating=true;
  renderGenList();
  try{
    const lang=$('manage-lang').value;
    const existingTitles=genGames.filter((_,i)=>i!==idx&&_.game).map(g=>g.game.meta?.title).filter(Boolean);
    loadedGames.filter(g=>g.lang===lang).forEach(g=>existingTitles.push(g.title));
    const res=await callWithRetry({action:'generate',lang,index:idx+1,total:genGames.length,topic:$('topic').value.trim(),alreadyUsed:existingTitles},idx+1);
    incGroq();
    item.game=res.game;
    item.status='pending';
    if(marketplaceQIndex&&res.game?.questions){const hits=marketplaceQIndex.findSimilar(res.game.questions).filter(h=>h.slug!==(item.slug||''));item.simWarning=hits.length?`${Math.round(hits[0].pct*100)}% pytań podobnych do marketplace: "${hits[0].title}"`:null;}
  }catch(e){ item.status='rejected'; item.game=null; }
  item.generating=false;
  renderGenList();
  // auto-open preview
  setTimeout(()=>{ const row=document.querySelector(`#gen-list .game-item:nth-child(${idx+1}) .game-row`); if(row){ const p=document.getElementById(`gp-${idx}`); if(p&&!p.classList.contains('open')){ p.classList.add('open'); row.querySelector('.game-chevron')?.classList.add('open'); } } },50);
};

async function callWithRetry(payload,num,maxRetries=4){
  let lastErr;
  for(let attempt=1;attempt<=maxRetries;attempt++){
    try{ return await call(payload); }
    catch(e){
      lastErr=e; if(attempt>=maxRetries)break;
      const cd=isRateLimit(e)?(attempt===1?15000:30000):(attempt===1?3000:8000);
      await sleep(cd);
    }
  }
  throw lastErr;
}

window.startGeneration = async function(){
  if(generating)return;
  const lang=$('manage-lang').value;
  const count=Math.max(1,parseInt($('count').value)||5);
  const topic=$('topic').value.trim();
  generating=true;
  $('gen-btn').disabled=true;
  $('gen-section').style.display='block';
  hideStatus('push-status');

  // init slots
  genGames=Array.from({length:count},(_,i)=>({game:null,status:'pending',generating:true,idx:i}));
  renderGenList();

  // get existing titles from local list
  const existingTitles=loadedGames.filter(g=>g.lang===lang).map(g=>g.title).filter(Boolean);

  // generate one by one
  for(let i=0;i<count;i++){
    const allUsed=[...existingTitles,...genGames.slice(0,i).filter(g=>g.game).map(g=>g.game.meta?.title).filter(Boolean)];
    try{
      const res=await callWithRetry({action:'generate',lang,index:i+1,total:count,topic,alreadyUsed:allUsed},i+1);
      incGroq(); genGames[i].game=res.game; genGames[i].status='pending';
      if(marketplaceQIndex&&res.game?.questions){
        const hits=marketplaceQIndex.findSimilar(res.game.questions);
        if(hits.length) genGames[i].simWarning=`${Math.round(hits[0].pct*100)}% pytań podobnych do marketplace: "${hits[0].title}"`;
        else genGames[i].simWarning=null;
      }
    }catch(e){
      genGames[i].game=null; genGames[i].status='rejected';
    }
    genGames[i].generating=false;
    renderGenList();
    // auto-open first generated
    if(i===0) setTimeout(()=>{ const row=document.querySelector('#gen-list .game-row'); if(row){ const p=document.getElementById('gp-0'); if(p){ p.classList.add('open'); row.querySelector('.game-chevron')?.classList.add('open'); } } },50);
    if(i<count-1) await sleep(300);
  }
  generating=false;
  $('gen-btn').disabled=false;
};

window.pushApproved = function(){
  const lang=$('manage-lang').value;
  const approved=genGames.filter(g=>g.status==='approved'&&g.game);
  if(!approved.length) return;
  if(!sessionActive) lockSession();
  approved.forEach(item=>{
    const gd=item.game;
    const slug=slugify(gd.slug||gd.meta?.title||'game');
    const gameForSave={...gd}; delete gameForSave.slug;
    loadedGames.push({num:null,filename:null,slug,sha:'',lang,indexKey:'',title:gd.meta?.title||slug,description:gd.meta?.description||'',data:gd,issueType:null,issueReason:'',isPendingAdd:true});
    pendingAdd.push({slug,content:JSON.stringify(gameForSave,null,2)+'\n'});
  });
  $('scan-btn').disabled=false;
  updatePendingBar(); renderManageList();
  // reset gen section
  genGames=[]; generating=false; $('gen-btn').disabled=false; $('gen-section').style.display='none';
};
</script>
</body>
</html>
