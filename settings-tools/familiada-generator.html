<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familiada Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;--accent:#e8c547;--accent2:#f07b3f;--text:#e8e8f0;--muted:#6b6b80;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--yellow:#fbbf24}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px}
  .wrap{width:100%;max-width:800px}
  header{text-align:center;margin-bottom:40px}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,9vw,80px);letter-spacing:4px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin-bottom:18px}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--accent);margin-bottom:18px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .field{display:flex;flex-direction:column;gap:5px}
  label{font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted)}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;padding:8px 12px;width:100%;outline:none;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  select option{background:var(--surface2)}
  textarea{resize:vertical;min-height:56px}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#0d0d0f;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;padding:12px 24px;width:100%;transition:opacity .2s,transform .1s}
  .btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
  .btn-sm{font-size:12.5px;padding:6px 13px;border-radius:7px;width:auto;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0;gap:5px}
  .btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
  .btn-secondary:hover:not(:disabled){background:#252530;opacity:1;transform:none}
  .btn-danger{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);color:var(--red)}
  .btn-danger:hover:not(:disabled){background:rgba(248,113,113,.22);opacity:1;transform:none}
  .btn-green{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:var(--green)}
  .btn-blue{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--blue)}
  .status-bar{font-size:12px;padding:7px 11px;border-radius:7px;margin-top:10px;display:none}
  .status-bar.visible{display:block}
  .status-bar.ok{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);color:var(--green)}
  .status-bar.err{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:var(--red)}
  .status-bar.info{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);color:var(--blue)}
  #progress-section{display:none}
  #progress-section.visible{display:block}
  .progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress-label{font-size:13px;font-weight:500;color:var(--muted)}
  .progress-counter{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)}
  .progress-bar-bg{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden;margin-bottom:14px}
  .progress-bar-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:99px;transition:width .4s ease;width:0%}
  #log{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 13px;max-height:220px;overflow-y:auto;font-size:12px;display:flex;flex-direction:column;gap:3px}
  .log-line{display:flex;gap:7px;align-items:flex-start}
  .log-icon{flex-shrink:0}
  .log-ok .log-icon{color:var(--green)}.log-err .log-icon{color:var(--red)}.log-wait .log-icon{color:var(--accent)}
  .log-text{color:var(--text);line-height:1.45}
  .log-sub{color:var(--muted);font-size:11px}
  .tip{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;font-size:12px;color:var(--muted);padding:8px 12px;line-height:1.6}
  #game-list{display:flex;flex-direction:column;gap:4px;margin-top:12px;max-height:500px;overflow-y:auto}
  .game-item{border-radius:7px;background:var(--surface2);border:1px solid var(--border);overflow:hidden}
  .game-item.issue-dup{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.04)}
  .game-item.issue-weak{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.03)}
  .game-row{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;user-select:none}
  .game-row:hover{background:rgba(255,255,255,.02)}
  .game-num{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);min-width:32px}
  .game-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
  .game-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;flex-shrink:0}
  .badge-dup{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.25)}
  .badge-weak{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
  .game-chevron{color:var(--muted);font-size:11px;flex-shrink:0;transition:transform .2s}
  .game-chevron.open{transform:rotate(90deg)}
  .game-preview{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
  .game-preview.open{display:block}
  .preview-desc{font-size:12px;color:var(--muted);margin:8px 0;line-height:1.55;font-style:italic}
  .preview-issue{font-size:11.5px;padding:5px 9px;border-radius:6px;margin:8px 0}
  .preview-issue.dup{background:rgba(251,191,36,.1);color:var(--yellow)}
  .preview-issue.weak{background:rgba(248,113,113,.08);color:var(--red)}
  .q-block{margin-bottom:9px}
  .q-text{font-size:12.5px;font-weight:600;margin-bottom:5px}
  .answers-grid{display:flex;flex-wrap:wrap;gap:4px}
  .ans-chip{font-size:11px;padding:2px 9px;border-radius:99px;background:var(--surface);border:1px solid var(--border);color:var(--muted);display:flex;gap:5px}
  .ans-pts{color:var(--accent);font-weight:600}
  @media(max-width:520px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">FAMILIADA</div>
    <div class="subtitle">Generator gier &nbsp;·&nbsp; Groq + GitHub</div>
  </header>

  <!-- Manage -->
  <div class="card">
    <div class="card-title">📋 Gry w marketplace</div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:4px">
      <div class="field" style="flex:1;min-width:120px">
        <label>Język</label>
        <select id="manage-lang" onchange="loadedGames=[];renderGameList();$('scan-btn').disabled=true;$('renumber-btn').disabled=true;$('manage-status').className='status-bar'">
          <option value="pl">🇵🇱 Polski</option>
          <option value="uk">🇺🇦 Українська</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="loadGameList()">Wczytaj listę</button>
      <button class="btn btn-sm btn-blue" id="scan-btn" onclick="scanGames()" disabled>🔍 Skanuj</button>
      <button class="btn btn-sm btn-green" id="renumber-btn" onclick="renumberGames()" disabled>Renumeruj</button>
    </div>
    <div id="game-list"><div style="color:var(--muted);font-size:12px;padding:12px 0;text-align:center">Wczytaj listę aby zobaczyć gry</div></div>
    <div class="status-bar" id="manage-status"></div>
  </div>

  <!-- Generate -->
  <div class="card">
    <div class="card-title">⚙️ Generuj nowe gry</div>
    <div class="grid-2" style="margin-bottom:13px">
      <div class="field">
        <label>Język</label>
        <select id="lang">
          <option value="pl">🇵🇱 Polski</option>
          <option value="uk">🇺🇦 Українська</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <div class="field">
        <label>Liczba gier</label>
        <input type="number" id="count" value="10" min="1" max="200">
      </div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label>Temat / kategoria (opcjonalnie)</label>
      <textarea id="topic" placeholder="Zostaw puste = AI dobierze różnorodne, unikalne tematy…"></textarea>
    </div>
    <div class="tip">Tematy istniejących gier przekazywane automatycznie do AI. 10–16 pytań na grę. Gry zapisywane na GitHub automatycznie.</div>
  </div>

  <button class="btn" id="gen-btn" onclick="startGeneration()">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    Generuj i zapisz na GitHub
  </button>

  <div class="card" id="progress-section" style="margin-top:18px">
    <div class="card-title">📡 Postęp</div>
    <div class="progress-header">
      <span class="progress-label" id="progress-text">Inicjalizacja…</span>
      <span class="progress-counter"><span id="done-count">0</span> / <span id="total-count">0</span></span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div id="log"></div>
  </div>
</div>

<script type="module">
import { sb } from '/../js/core/supabase.js';

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function isRateLimit(e){ const m=(e?.message||'').toLowerCase(); return m.includes('429')||m.includes('rate')||m.includes('limit')||m.includes('too many'); }
function showStatus(id,msg,type='info'){ const el=$(id); el.textContent=msg; el.className=`status-bar visible ${type}`; }
function log(icon,text,sub='',cls=''){ const el=document.createElement('div'); el.className='log-line '+cls; el.innerHTML=`<span class="log-icon">${icon}</span><span class="log-text">${text}${sub?`<br><span class="log-sub">${sub}</span>`:''}</span>`; $('log').appendChild(el); $('log').scrollTop=$('log').scrollHeight; }
function setProgress(done,total){ $('done-count').textContent=done; $('total-count').textContent=total; $('progress-fill').style.width=total>0?`${(done/total)*100}%`:'0%'; }

async function call(body) {
  const {data,error} = await sb().functions.invoke('generate-game', {body});
  if (error) throw new Error(error.message||JSON.stringify(error));
  if (data?.error) throw new Error(data.error);
  return data;
}

// ─── game list ────────────────────────────────────────────────────────────────
let loadedGames = [];

window.loadGameList = async function(){
  const lang=$('manage-lang').value;
  showStatus('manage-status','Wczytuję z GitHub…','info');
  $('game-list').innerHTML='<div style="color:var(--muted);font-size:12px;padding:12px 0;text-align:center">Ładowanie…</div>';
  $('scan-btn').disabled=true; $('renumber-btn').disabled=true;
  try{
    const res = await call({action:'list-games',lang});
    loadedGames = res.games || [];
    renderGameList();
    const hasGaps = checkGaps();
    $('scan-btn').disabled = loadedGames.length===0;
    $('renumber-btn').disabled = !hasGaps;
    showStatus('manage-status',`${loadedGames.length} gier.${hasGaps?' Wykryto luki — kliknij Renumeruj.':''}`,'ok');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); $('game-list').innerHTML=''; }
};

function checkGaps(){ return loadedGames.some((g,i)=>g.num!==i+1); }

function renderGameList(){
  const list=$('game-list'); list.innerHTML='';
  if(!loadedGames.length){ list.innerHTML='<div style="color:var(--muted);font-size:12px;padding:12px 0;text-align:center">Brak gier.</div>'; return; }
  loadedGames.forEach((g,idx)=>{
    const issueClass=g.issueType==='dup'?'issue-dup':g.issueType==='weak'?'issue-weak':'';
    const badge=g.issueType==='dup'?`<span class="game-badge badge-dup">duplikat</span>`:g.issueType==='weak'?`<span class="game-badge badge-weak">słaba</span>`:'';
    const el=document.createElement('div');
    el.className=`game-item ${issueClass}`;
    el.innerHTML=`
      <div class="game-row" onclick="togglePreview(${idx},this)">
        <span class="game-num">${String(g.num).padStart(3,'0')}</span>
        <span class="game-title">${esc(g.title)}</span>
        ${badge}
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteGame(${idx})" title="Usuń" style="padding:3px 9px;font-size:12px">✕</button>
        <span class="game-chevron">▶</span>
      </div>
      <div class="game-preview" id="preview-${idx}">
        ${g.issueReason?`<div class="preview-issue ${g.issueType}">${esc(g.issueReason)}</div>`:''}
        ${g.description?`<div class="preview-desc">${esc(g.description)}</div>`:''}
        <div id="pq-${idx}">${g.data?.questions?renderQs(g.data.questions):'<span style="color:var(--muted);font-size:12px">—</span>'}</div>
      </div>`;
    list.appendChild(el);
  });
}

function renderQs(qs){ return qs.map((q,i)=>`<div class="q-block"><div class="q-text">${i+1}. ${esc(q.text)}</div><div class="answers-grid">${(q.answers||[]).map(a=>`<span class="ans-chip">${esc(a.text)}<span class="ans-pts">${a.fixed_points}</span></span>`).join('')}</div></div>`).join(''); }

window.togglePreview = function(idx,row){
  const p=document.getElementById(`preview-${idx}`);
  const ch=row.querySelector('.game-chevron');
  const open=p.classList.toggle('open');
  ch.classList.toggle('open',open);
};

// ─── scan ─────────────────────────────────────────────────────────────────────
window.scanGames = async function(){
  if(!loadedGames.length)return;
  $('scan-btn').disabled=true;
  showStatus('manage-status','Analizuję przez AI…','info');
  try{
    const lang=$('manage-lang').value;
    const games=loadedGames.map(g=>({slug:g.slug||g.filename.replace('.json',''),title:g.title,description:g.description||''}));
    const res=await call({action:'scan',lang,games});
    loadedGames.forEach(g=>{g.issueType=null;g.issueReason='';});
    for(const issue of (res.issues||[])){
      for(const slug of (issue.slugs||[])){
        const g=loadedGames.find(x=>x.slug===slug);
        if(g){g.issueType=issue.type;g.issueReason=issue.reason||'';}
      }
    }
    const dups=(res.issues||[]).filter(i=>i.type==='duplicate').length;
    const weaks=(res.issues||[]).filter(i=>i.type==='weak').length;
    renderGameList();
    showStatus('manage-status',(res.issues||[]).length===0?'✓ Brak problemów.':`${dups} grup duplikatów · ${weaks} słabych gier`,(res.issues||[]).length===0?'ok':'info');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); }
  finally{ $('scan-btn').disabled=false; }
};

// ─── delete ───────────────────────────────────────────────────────────────────
window.deleteGame = async function(idx){
  const g=loadedGames[idx];
  if(!confirm(`Usunąć grę ${String(g.num).padStart(3,'0')} – ${g.title}?`))return;
  showStatus('manage-status',`Usuwam…`,'info');
  try{
    await call({action:'delete-game',lang:g.lang,filename:g.filename,sha:g.sha,indexKey:g.indexKey});
    loadedGames.splice(idx,1);
    renderGameList();
    $('renumber-btn').disabled=!checkGaps();
    showStatus('manage-status','Usunięto.','ok');
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); }
};

// ─── renumber ─────────────────────────────────────────────────────────────────
window.renumberGames = async function(){
  if(!confirm('Renumerowanie zmieni nazwy plików na GitHubie. Kontynuować?'))return;
  $('renumber-btn').disabled=true;
  showStatus('manage-status','Renumeruję…','info');
  try{
    const lang=$('manage-lang').value;
    const games=loadedGames.map(g=>({num:g.num,filename:g.filename,sha:g.sha,slug:g.slug,indexKey:g.indexKey}));
    const res=await call({action:'renumber',lang,games});
    showStatus('manage-status',`Renumerowano ${res.renamed} gier. Odśwież listę.`,'ok');
    await loadGameList();
  }catch(e){ showStatus('manage-status','✗ '+e.message,'err'); $('renumber-btn').disabled=false; }
};

// ─── generate ─────────────────────────────────────────────────────────────────
let running=false;

async function callWithRetry(payload,num,maxRetries=4){
  let lastErr;
  for(let attempt=1;attempt<=maxRetries;attempt++){
    try{ return await call(payload); }
    catch(e){
      lastErr=e; if(attempt>=maxRetries)break;
      const cd=isRateLimit(e)?(attempt===1?15000:30000):(attempt===1?3000:8000);
      $('progress-text').textContent=`Gra ${num} – błąd, czekam ${cd/1000}s… (próba ${attempt})`;
      const logEl=$('log').lastChild;
      if(logEl)logEl.querySelector('.log-sub').textContent=`${e.message} — ponawiam za ${cd/1000}s`;
      await sleep(cd);
    }
  }
  throw lastErr;
}

window.startGeneration = async function(){
  if(running)return;
  const lang=$('lang').value;
  const count=Math.max(1,parseInt($('count').value)||10);
  const topic=$('topic').value.trim();

  $('progress-section').classList.add('visible'); $('log').innerHTML='';
  $('progress-text').textContent='Odczytuję istniejące gry…'; setProgress(0,count);
  running=true; $('gen-btn').disabled=true;

  // get existing titles to pass to AI
  let nextIndex=1; const existingTitles=[];
  try{
    const res=await call({action:'list-games',lang});
    const games=res.games||[];
    games.forEach(g=>{ if(g.title)existingTitles.push(g.title); });
    nextIndex=games.length?Math.max(...games.map(g=>g.num))+1:1;
  }catch(e){ log('⚠','Nie można odczytać istniejących gier',e.message,'log-wait'); }
  log('ℹ',`Start od numeru ${String(nextIndex).padStart(3,'0')}`,`${existingTitles.length} tematów przekazanych do AI`,'log-wait');

  let done=0,errors=0,currentIndex=nextIndex;
  for(let i=0;i<count;i++){
    const num=String(currentIndex).padStart(3,'0');
    log('⏳',`Generuję grę ${num}…`,topic||'temat losowany przez AI','log-wait');
    try{
      const res=await callWithRetry({action:'generate',lang,index:currentIndex,total:count,topic,alreadyUsed:existingTitles},num);
      const game=res.game; const iKey=res.indexKey||'?';
      existingTitles.push(game?.meta?.title||'');
      done++; currentIndex++;
      setProgress(done,count);
      $('progress-text').textContent=`Wygenerowano ${done} z ${count}…`;
      $('log').lastChild.remove();
      log('✓',`<strong>${num} – ${esc(game?.meta?.title)}</strong>`,`${game?.questions?.length??'?'} pytań · ${iKey}`,'log-ok');
    }catch(e){
      errors++; $('log').lastChild.remove();
      log('✗',`Błąd gry ${num}`,e.message,'log-err');
      currentIndex++;
    }
    if(i<count-1) await sleep(400);
  }
  running=false; $('gen-btn').disabled=false;
  $('progress-text').textContent=`Gotowe! ${done} gier${errors?`, ${errors} błędów`:''}`;
  if(done) log('🎉','<strong>Gotowe!</strong>',`${done} gier na GitHub · index.json zaktualizowany.`,'log-ok');
};
</script>
</body>
</html>
