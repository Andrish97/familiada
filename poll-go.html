  <link rel="icon" href="favicon.ico?v=v2026-04-23T16383"/>

<body class="poll-go-body">
  <header class="topbar topbar-layout-4 topbar-mobile-keep-brand">
    <div class="topbar-section topbar-section-1">
      <div class="brand">FAMILIADA</div>
    </div>
    <div class="topbar-section topbar-section-2"></div>
    <div class="topbar-section topbar-section-3"></div>
    <div class="topbar-section topbar-section-4"></div>
  </header>

  <main class="wrap">
    <section class="card poll-go-card">
      <div class="poll-go-title" id="title" data-i18n="pollGo.loadingTitle">Ładuję zaproszenie…</div>
      <div class="poll-go-sub" id="message" data-i18n="pollGo.loadingText">Proszę czekać.</div>

      <div class="poll-go-email" id="emailRow" style="display:none;">
        <input class="inp" id="emailInput" placeholder="Podaj e-mail" data-i18n-placeholder="pollGo.emailPlaceholder" type="email"/>
      </div>

      <div class="poll-go-actions" id="actions"></div>
      <div class="poll-go-hint" id="hint"></div>
    </section>

    <div class="footer">
      <div data-i18n="common.footer.left">© 2026 Familiada — system do gry na żywo</div>
      <button class="btn-contact-footer" type="button" data-contact-modal data-i18n="common.contactBtn">Kontakt</button>
    </div>
  </main>
  <script type="module" src="js/core/contact-modal.js?v=v2026-04-23T16383"></script>
