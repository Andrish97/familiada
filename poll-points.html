<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050914">
  <title data-i18n="pollPoints.title">Familiada — sondaż</title>

  <link rel="icon" href="favicon.ico"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/poll.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script type="module" src="js/pages/poll-points.js" defer></script>
</head>

<body class="pollpub-body is-points">
  <main class="wrap">
    <div class="card">
      <div class="brand">FAMILIADA</div>
      <div class="title" id="title" data-i18n="pollPoints.pollTitle">Sondaż</div>
      <div class="sub" id="sub" data-i18n="pollPoints.loading">Ładuję…</div>

      <div class="qbox" id="qbox" style="display:none;">
        <div class="qtext" id="qtext">—</div>
        <div class="alist" id="alist"></div>

        <div class="nav">
          <div class="small" id="prog">—</div>
        </div>
      </div>

      <div class="closed" id="closed" style="display:none;">-</div>
    </div>

    <div class="footer">
      <div data-i18n="common.footer.left">© 2026 Familiada — system do gry na żywo</div>
      <button class="btn-contact-footer" type="button" data-contact-modal data-i18n="common.contactBtn">Kontakt</button>
    </div>
  </main>
  <script type="module" src="js/core/contact-modal.js"></script>
</body>
</html>
