name: Deploy GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "supabase/**"
      - "cloudflare/**"
      - ".github/workflows/**"
      - "README*"
      - "LICENSE*"
      - "*.md"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Version assets (cache busting)
        env:
          VERSION_HASH: v${{ github.sha }}
        run: node scripts/version-assets.js

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
