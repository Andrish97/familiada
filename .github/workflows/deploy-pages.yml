name: Deploy GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "searxng/**"
      - "supabase/**"
      - "cloudflare/**"
      - "services/**"
      - "scripts/deploy-searxng.sh"
      - "scripts/deploy-edge.sh"
      - "scripts/apply-migrations.sh"
      - "scripts/deploy-lead-finder.sh"
      - ".github/workflows/**"
      - "README*"
      - "LICENSE*"
      - "*.md"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Version assets (cache busting)
        run: node scripts/version-assets.js

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
          
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "ci: update version hashes [skip ci]"
            
            # Pobieramy najnowszą wersję
            git pull origin main --no-rebase
            
            # Wypchnij zmiany z force, aby uniknąć konfliktów z historią
            for i in {1..3}; do
              git push origin HEAD:main --force && break || sleep 5
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
