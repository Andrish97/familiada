name: Deploy SearXNG

on:
  push:
    branches: ["main"]
    paths:
      - "searxng/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync + ssh
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Setup SSH key
        run: |
          mkdir -p $HOME/.ssh
          chmod 700 $HOME/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $HOME/.ssh/id_ed25519
          chmod 600 $HOME/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> $HOME/.ssh/known_hosts

      - name: Sync SearXNG config to server staging
        run: |
          STAGING="/home/${{ secrets.SERVER_USER }}/.deploy/searxng/${{ github.sha }}"
          ssh -i $HOME/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "mkdir -p \"$STAGING\""
          rsync -az --delete --checksum \
            -e "ssh -i $HOME/.ssh/id_ed25519" \
            searxng/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$STAGING/"

      - name: Run deploy script (server-side)
        run: |
          STAGING="/home/${{ secrets.SERVER_USER }}/.deploy/searxng/${{ github.sha }}"
          SCRIPT="/home/${{ secrets.SERVER_USER }}/supabase-selfhost/supabase/scripts/deploy-searxng.sh"
          ssh -i $HOME/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "$SCRIPT \"$STAGING\""
