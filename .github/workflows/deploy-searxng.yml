name: Deploy SearXNG

on:
  push:
    branches: ["main"]
    paths:
      - "searxng/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync + ssh
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync SearXNG config to server
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p /home/${{ secrets.SERVER_USER }}/.deploy/searxng/${{ github.sha }}"

          rsync -az --delete --checksum \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            searxng/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USER }}/.deploy/searxng/${{ github.sha }}/"

      - name: Run deploy script (server-side)
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "/home/${{ secrets.SERVER_USER }}/supabase-selfhost/supabase/scripts/deploy-searxng.sh /home/${{ secrets.SERVER_USER }}/.deploy/searxng/${{ github.sha }}"
