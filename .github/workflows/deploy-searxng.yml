name: Deploy SearXNG

on:
  push:
    branches: ["main"]
    paths:
      - "searxng/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SEARXNG_SSH_KEY }}

      - name: Add Host to Known Hosts
        run: ssh-keyscan -H panel.familiada.online >> ~/.ssh/known_hosts

      - name: Sync SearXNG folder
        run: |
          rsync -avz \
            --exclude '.DS_Store' \
            --exclude 'docker-compose.yml' \
            --exclude '.env' \
            searxng/ \
            andrish97@panel.familiada.online:/home/andrish97/supabase-selfhost/supabase/docker/searxng/

      - name: Restart Container
        run: |
          ssh andrish97@panel.familiada.online "
            cd /home/andrish97/supabase-selfhost/supabase/docker
            docker compose restart searxng
            echo '✅ SearXNG restarted'
          "
