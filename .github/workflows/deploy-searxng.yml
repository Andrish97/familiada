name: Deploy SearXNG

on:
  push:
    branches: ["main"]
    paths:
      - "searxng/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync + ssh
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Skrypt nie robi ssh-keyscan, więc musimy to zrobić ręcznie przed jego uruchomieniem
          ssh-keyscan -H panel.familiada.online >> ~/.ssh/known_hosts

      - name: Run Deploy Script
        run: |
          chmod +x scripts/deploy-searxng.sh
          bash scripts/deploy-searxng.sh
