name: Deploy lead finder to server

on:
  push:
    branches: ["main"]
    paths:
      - "lead_finder_runner.py"
      - "trigger_server.py"
      - ".github/workflows/lead-finder.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get install -y rsync openssh-client
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
          DEST="/home/${{ secrets.SERVER_USER }}/familiada"
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "mkdir -p $DEST"
          rsync -az --checksum -e "ssh -i ~/.ssh/id_ed25519" \
            lead_finder_runner.py trigger_server.py \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:$DEST/"
          echo "✅ Deployed lead_finder_runner.py + trigger_server.py"
