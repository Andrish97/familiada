<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title data-i18n="connectDevice.title">Familiada — Podłącz urządzenie</title>

  <link rel="icon" href="favicon.ico"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#050914"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/builder.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script type="module" src="js/pages/connect-device.js" defer></script>
  <script type="module" src="js/core/topbar-mobile-menu.js" defer></script>
</head>

<body class="builder-body">
  <header class="topbar topbar-layout-4 topbar-mobile-keep-brand">
    <div class="topbar-section topbar-section-1">
      <div class="brand">FAMILIADA</div>
      <button class="btn" id="btnBack" type="button" data-i18n="connectDevice.topbar.back">← Moje gry</button>
    </div>
    <div class="topbar-section topbar-section-2"></div>
    <div class="topbar-section topbar-section-3"></div>
    <div class="topbar-section topbar-section-4">
      <div class="who" id="whoStatic">—</div>
      <button class="btn user-btn" id="btnAccount" type="button">
        <span class="user-name" id="who">—</span>
        <span class="user-sub" data-i18n="builder.nav.account">Ustawienia konta</span>
      </button>
      <button class="btn" id="btnLogout" type="button" data-i18n="common.authEntry">Zaloguj / Załóż konto</button>
    </div>
  </header>

  <main class="wrap">
    <div class="bar">
      <div>
        <div class="title" data-i18n="connectDevice.header.title">Podłącz urządzenie</div>
        <div class="hint" id="pageHint" data-i18n="connectDevice.header.hint">Zeskanuj kod QR lub otwórz link, żeby podłączyć urządzenie.</div>
      </div>
    </div>

    <section class="builder-shell">
      <div class="card builder-card" style="padding:24px;display:grid;gap:24px;">

        <!-- Sekcja: Zeskanuj QR urządzenia (tylko mobile/tablet) -->
        <div id="scanSection">
          <div style="font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;font-size:.85rem;" data-i18n="connectDevice.scan.title">Zeskanuj kod QR urządzenia</div>
          <div style="font-size:.88rem;opacity:.7;margin-bottom:12px;" data-i18n="connectDevice.scan.hint">Skieruj kamerę na kod QR wyświetlony w panelu sterowania.</div>
          <button class="btn sm gold" id="btnScanQr" type="button" data-i18n="connectDevice.scan.btn">📷 Otwórz kamerę</button>
          <div id="scanMsg" style="margin-top:8px;font-size:.85rem;opacity:.7;"></div>
        </div>

        <hr style="border:none;border-top:1px solid rgba(255,255,255,.1);margin:0;"/>

        <!-- Sekcja: Urządzenia udostępnione mi -->
        <div>
          <div style="font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;font-size:.85rem;" data-i18n="connectDevice.shared.title">Urządzenia udostępnione mi</div>
          <div id="sharedDevicesList" style="display:grid;gap:8px;min-height:40px;">
            <div style="opacity:.55;font-size:.88rem;" data-i18n="connectDevice.shared.loading">Ładowanie…</div>
          </div>
        </div>

        <div id="msg" style="font-size:.88rem;min-height:18px;"></div>
      </div>
    </section>

    <div class="footer">
      <div data-i18n="common.footer.left">© 2026 Familiada — system do gry na żywo</div>
      <button class="btn-contact-footer" type="button" data-contact-modal data-i18n="common.contactBtn">Kontakt</button>
    </div>
  </main>

  <script type="module" src="js/core/contact-modal.js"></script>
</body>
</html>
