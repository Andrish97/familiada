<!DOCTYPE html>
<html lang="pl">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta name="app-version" content="v2026-07-15T22030"/>

  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title data-i18n="connectDevice.title">Familiada — Podłącz urządzenie</title>

  <link rel="icon" href="favicon.ico?v=v2026-07-15T22030"/>
  <link rel="manifest" href="/manifest.json?v=v2026-07-15T22030"/>
  <meta name="theme-color" content="#050914"/>
  <link rel="stylesheet" href="css/base.css?v=v2026-07-15T22030"/>
  <link rel="stylesheet" href="css/builder.css?v=v2026-07-15T22030"/>
  <link rel="stylesheet" href="css/connect-device.css?v=v2026-07-15T22030"/>

  <script>document.documentElement.classList.add('page-loading')</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/core/security-warning.js?v=v2026-07-15T22030" defer></script>
  <script type="module" src="js/pages/connect-device.js?v=v2026-07-15T22030" defer></script>
  <script type="module" src="js/core/topbar-controller.js?v=v2026-07-15T22030" defer></script>
</head>

<body class="builder-body">
  <header class="topbar topbar-layout-4">
    <div class="topbar-section topbar-section-1">
      <div class="brand">FAMILIADA</div>
      <button class="btn" id="btnBack" type="button" data-i18n="connectDevice.topbar.back">← Moje gry</button>
    </div>
    <div class="topbar-section topbar-section-2"></div>
    <div class="topbar-section topbar-section-3">
      <button class="btn" id="btnManual" type="button">ℹ️</button>
      <!-- switcher języka wstrzykiwany przez initI18n -->
    </div>
    <div class="topbar-section topbar-section-4">
      <span class="who" id="who">—</span>
      <button class="btn" id="btnLogout" type="button" data-i18n="common.authEntry">Zaloguj / Załóż konto</button>
    </div>
  </header>

  <main class="wrap">
    <div class="bar">
      <div>
        <div class="title" data-i18n="connectDevice.header.title">Podłącz urządzenie</div>
        <div class="hint" id="pageHint"></div>
        <div id="msg" class="connect-device-msg"></div>
      </div>
      <div class="actions">
        <!-- tylko na mobile/tablet – skanowanie QR -->
        <button class="btn sm gold" id="btnScanQr" style="display:none;" type="button" data-i18n="connectDevice.scan.btn">📷 Skanuj QR</button>
      </div>
    </div>

    <section class="builder-shell">
      <!-- Blok: Wprowadź kod -->
      <div class="card builder-card" id="enterCodeCard">
        <div class="connect-device-card-header" data-i18n="connectDevice.enterCode.title">Wprowadź kod urządzenia</div>
        <div class="connect-device-enter-code-row">
          <input class="inp connect-device-code-input" id="connectCodeInput" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="off" spellcheck="false" data-i18n-placeholder="connectDevice.enterCode.placeholder"/>
          <button class="btn gold" id="btnConnectCode" type="button" data-i18n="connectDevice.enterCode.btn">Podłącz</button>
        </div>
        <div id="connectCodeMsg" class="connect-device-msg"></div>
      </div>

      <!-- Blok: Udostępnione dla mnie (tylko zalogowani) -->
      <div class="card builder-card" id="sharedDevicesCard" style="display:none;">
        <div class="connect-device-card-header" data-i18n="connectDevice.shared.title">Urządzenia udostępnione dla mnie</div>
        <div id="sharedDevicesList" class="grid"></div>
      </div>
    </section>

    <div class="footer">
      <div data-i18n="common.footer.left">© 2026 Familiada — system do gry na żywo</div>
      <button class="btn-contact-footer" type="button" data-contact-modal data-i18n="common.contactBtn">Kontakt</button>
    </div>
  </main>

  <!-- Modal: podgląd urządzenia po kodzie -->
  <div class="overlay" id="devicePreviewOverlay" style="display:none;">
    <div class="modal">
      <div class="mHead">
        <div class="mTitle" id="devicePreviewTitle">Urządzenie</div>
        <button class="btn sm" id="btnDevicePreviewClose" type="button">✕</button>
      </div>
      <div class="mSub" id="devicePreviewSub"></div>
      <div class="importRow" style="margin-top:16px;">
        <button class="btn gold" id="btnDevicePreviewConnect" type="button" data-i18n="connectDevice.enterCode.connectBtn">Połącz</button>
        <button class="btn" id="btnDevicePreviewCancel" type="button" data-i18n="common.cancel">Anuluj</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/core/contact-modal.js?v=v2026-07-15T22030"></script>
</body>
</html>
